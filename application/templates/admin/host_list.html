{% extends 'admin/model/list.html' %}

{% block body %}
{{ super() }}

<div class="modal fade" id="setTemplateModal" tabindex="-1" role="dialog"
     aria-labelledby="setTemplateModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form method="POST" action="{{ url_for('.process_template_assignment') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="host_ids" id="setTemplateHostIds" value="">

        <div class="modal-header">
          <h5 class="modal-title" id="setTemplateModalLabel">Set CMDB Template</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body">
          <p class="text-muted" style="font-size: 0.9rem;">
            <span id="setTemplateHostCount">0</span> host(s) will be assigned.
          </p>
          <div class="form-group mb-0">
            <label for="setTemplateId">Select template</label>
            <select class="form-control" id="setTemplateId" name="template_id" required>
              <option value="">Choose a template…</option>
              {% for template in set_template_choices or [] %}
                <option value="{{ template.id }}">{{ template.hostname }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Apply Template</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block tail %}
{{ super() }}
<script>
(function() {
  // The "With selected…" dropdown items call modelActions.execute(name).
  // `modelActions` is created by actions.js which is loaded inside
  // flask-admin's `tail` block — we must hook in this same block,
  // AFTER super(), or the global doesn't exist yet.
  if (typeof modelActions === 'undefined' || !modelActions.execute) {
    return;
  }
  var origExecute = modelActions.execute.bind(modelActions);
  modelActions.execute = function(name) {
    if (name !== 'set_template') {
      return origExecute(name);
    }
    var ids = [];
    $('input.action-checkbox:checked').each(function() {
      ids.push($(this).val());
    });
    if (ids.length === 0) {
      alert('Please select at least one host.');
      return false;
    }
    $('#setTemplateHostIds').val(ids.join(','));
    $('#setTemplateHostCount').text(ids.length);
    $('#setTemplateModal').modal('show');
    return false;
  };
})();
</script>
{% endblock %}

<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="app-card" style="margin-top: 1.5rem;">
            <div class="app-hero" style="margin: -1.5rem -1.5rem 1.25rem; border-radius: 12px 12px 0 0;">
                <h2>Copy as new</h2>
                <p>Create a new host as a copy of <strong>{{ source.hostname }}</strong>.</p>
            </div>
            <form method="POST" action="{{ url_for('.copy_as_new_process') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="source_id" value="{{ source.id }}">

                <div class="form-group">
                    <label for="new_hostname">New hostname</label>
                    <input type="text" class="form-control" id="new_hostname"
                           name="new_hostname" required autofocus
                           value="{{ default_name }}">
                    <small class="form-text text-muted">
                        Labels, CMDB fields and assigned templates are cloned.
                        Timestamps and sync state are reset so the clone isn't
                        mistaken for a recent import.
                    </small>
                </div>

                <div class="form-group mb-0">
                    <button type="submit" class="btn btn-primary">Create copy</button>
                    <a href="{{ url_for('.index_view') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

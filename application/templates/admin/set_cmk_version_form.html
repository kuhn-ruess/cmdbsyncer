<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">
        <div class="app-card" style="margin-top: 1.5rem;">
            <div class="app-hero" style="margin: -1.5rem -1.5rem 1.25rem; border-radius: 12px 12px 0 0;">
                <h2>Set CMK Version</h2>
                <p>Apply a Checkmk version to {{ ids|length }} rule(s).</p>
            </div>
            <form method="POST" action="{{ url_for('.process_cmk_version_assignment') }}">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <input type="hidden" name="rule_ids" value="{{ ids|join(',') }}">
                <div class="form-group">
                    <label for="cmk_version">CMK Version</label>
                    <input type="text" class="form-control" id="cmk_version" name="cmk_version" required placeholder="e.g. 2.3.0p16">
                </div>
                <div class="form-group mb-0">
                    <button type="submit" class="btn btn-primary">Apply Version</button>
                    <a href="{{ url_for('.index_view') }}" class="btn btn-secondary">Cancel</a>
                </div>
            </form>
        </div>
    </div>
</div>

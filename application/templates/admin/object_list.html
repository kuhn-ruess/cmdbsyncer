{% extends 'admin/model/list.html' %}

{% block body %}
{{ super() }}

<div class="modal fade" id="copyAsNewModal" tabindex="-1" role="dialog"
     aria-labelledby="copyAsNewModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form method="POST" action="{{ url_for('.copy_as_new_process') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="source_id" id="copyAsNewSourceId" value="">

        <div class="modal-header">
          <h5 class="modal-title" id="copyAsNewModalLabel">Copy as new</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body">
          <div class="form-group mb-0">
            <label for="copyAsNewHostname">New name</label>
            <input type="text" class="form-control" id="copyAsNewHostname"
                   name="new_hostname" required>
            <small class="form-text text-muted">
              Labels, CMDB fields and assigned templates are cloned. Timestamps
              and sync state are reset.
            </small>
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Create copy</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block tail %}
{{ super() }}
<script>
(function() {
  // Same search-syntax tooltip as the host list — the Object list
  // shares HostnameAndLabelSearchMixin and therefore the same parser.
  var SEARCH_HELP = [
    'Search syntax:',
    '  prod              — substring on hostname / label & inventory values; exact match on label/inventory key',
    '  prod AND web      — both must match (space alone also means AND)',
    '  prod OR stage     — either matches',
    '  NOT archived  /  !archived',
    '  (prod OR stage) AND NOT test',
    '  hostname:web*     — wildcard match against the hostname',
    '  env:prod          — value under labels.env or inventory.env',
    '  labels.env:prod   — only labels.env (use inventory. for inventory)',
    '  basti_test*       — keys starting with basti_test (e.g. basti_test2)',
    '  "foo bar"         — quote to keep spaces and disable * / ?'
  ].join('\n');
  $('input[name="search"]').attr('title', SEARCH_HELP);

  // Intercept the Copy-as-new ROW icon so it opens the modal instead
  // of navigating to the bare form template. The icon is rendered as
  // <a href="…/copy_as_new_form?source_id=…"> by EndpointLinkRowAction.
  $(document).on('click', 'a[href*="copy_as_new_form"]', function(ev) {
    ev.preventDefault();
    var href = $(this).attr('href');
    var match = /[?&]source_id=([^&]+)/.exec(href || '');
    if (!match) { return; }
    var sourceId = decodeURIComponent(match[1]);
    $('#copyAsNewSourceId').val(sourceId);
    var rowName = $(this).closest('tr').find('td').eq(1).text().trim();
    $('#copyAsNewHostname').val(rowName ? rowName + '-copy' : '');
    $('#copyAsNewModal').modal('show');
  });
})();
</script>
{% endblock %}

{% extends 'admin/model/list.html' %}

{% block body %}
{{ super() }}

<div class="modal fade" id="setCmkVersionModal" tabindex="-1" role="dialog"
     aria-labelledby="setCmkVersionModalLabel" aria-hidden="true">
  <div class="modal-dialog" role="document">
    <div class="modal-content">
      <form method="POST" action="{{ url_for('.process_cmk_version_assignment') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="rule_ids" id="setCmkVersionRuleIds" value="">

        <div class="modal-header">
          <h5 class="modal-title" id="setCmkVersionModalLabel">Set CMK Version</h5>
          <button type="button" class="close" data-dismiss="modal" aria-label="Close">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>

        <div class="modal-body">
          <p class="text-muted" style="font-size: 0.9rem;">
            <span id="setCmkVersionEntryCount">0</span> entrie(s) will be updated.
          </p>
          <div class="form-group mb-0">
            <label for="setCmkVersionInput">CMK Version</label>
            <input type="text" class="form-control" id="setCmkVersionInput"
                   name="cmk_version" required placeholder="e.g. 2.3.0p16">
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
          <button type="submit" class="btn btn-primary">Apply Version</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}

{% block tail %}
{{ super() }}
<script>
(function() {
  if (typeof modelActions === 'undefined' || !modelActions.execute) {
    return;
  }
  var origExecute = modelActions.execute.bind(modelActions);
  modelActions.execute = function(name) {
    if (name !== 'set_cmk_version') {
      return origExecute(name);
    }
    var ids = [];
    $('input.action-checkbox:checked').each(function() {
      ids.push($(this).val());
    });
    if (ids.length === 0) {
      alert('Please select at least one entry.');
      return false;
    }
    $('#setCmkVersionRuleIds').val(ids.join(','));
    $('#setCmkVersionEntryCount').text(ids.length);
    $('#setCmkVersionModal').modal('show');
    return false;
  };
})();
</script>
{% endblock %}

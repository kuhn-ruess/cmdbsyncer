
# The installer is staged on the controller in `installation_staging_path`
# (from the Checkmk Settings, served via the inventory), falling back to
# /tmp when it is unset. Set the path to something other than /tmp whenever
# the executing user can't reliably use /tmp — e.g. permission problems or
# private-tmp isolation, where a /tmp staged file is not visible to the
# copy step. The install target below stays /tmp on the remote host.
- name: "Determine the local staging directory for the installer"
  ansible.builtin.set_fact:
    cmk_local_staging: "{{ installation_staging_path | default('/tmp', true) }}"

- name: "Ensure the local staging directory exists"
  ansible.builtin.file:
    path: "{{ cmk_local_staging }}"
    state: directory
  delegate_to: localhost

- name: "Check if we have the Installation File local"
  ansible.builtin.stat:
    path: "{{ cmk_local_staging }}/{{ cmk_version_filename }}"
  register: installation_file
  delegate_to: localhost

- name: "Download Installation File from Checkmk Server"
  ansible.builtin.uri:
    url: "https://download.checkmk.com/checkmk/{{ cmk_version }}/{{ cmk_version_filename}}"
    dest: "{{ cmk_local_staging }}/{{ cmk_version_filename }}"
    method: GET
    user: "{{ subscription_username }}"
    password: "{{ subscription_password }}"
    force_basic_auth: True
  when: not installation_file.stat.exists
  delegate_to: localhost

- name: "Check if Version is already installed on the Servers"
  ansible.builtin.shell: |
    set -o pipefail
    omd versions | egrep -o {{ cmk_version }}
  args:
    executable: /bin/bash
  register: checkmk_version_installed
  changed_when: false
  ignore_errors: yes

- name: "Copy Installation File to Servers"
  ansible.builtin.copy:
    src: "{{ cmk_local_staging }}/{{ cmk_version_filename }}"
    dest: "/tmp/{{ cmk_version_filename }}"
  when: checkmk_version_installed.stdout != cmk_version

- ansible.builtin.include_tasks: "{{ ansible_os_family }}-tasks.yml"


- name: "Check Site versions"
  become: True
  ansible.builtin.shell: |
    set -o pipefail
    omd version {{ cmk_site }} | egrep -o '[^ ]+$'
  args:
    executable: /bin/bash
  changed_when: server_site_version.stdout != cmk_version+"."+cmk_edition
  register: server_site_version
  ignore_errors: True

- name: "Create needed Sites on Servers"
  become: True
  ansible.builtin.shell: |
    set -o pipefail
    omd -V {{ cmk_version }}.{{ cmk_edition }} create {{ cmk_site }}
    echo '{{ inital_password }}' | htpasswd -i -B -C 12 /omd/sites/{{ cmk_site }}/etc/htpasswd cmkadmin
    omd start {{ cmk_site }}
  args:
    executable: /bin/bash
  when: server_site_version.stderr.startswith("No such site")
  register: site_just_installed

- name: "Calculation downtime start"
  command: "date +'%Y-%m-%dT%H:%M:%S%:z'"
  register: checkmk_downtime_start
  delegate_to: localhost

- name: "Calculation downtime end +{{ cmk_downtime_range }} hours"
  command: "date +'%Y-%m-%dT%H:%M:%S%:z' --date '+{{ cmk_downtime_range }} hours'"
  register: checkmk_downtime_end
  delegate_to: localhost

- name: "Set host to downtime before site update"
  ansible.builtin.uri:
    url: "{{ cmk_main_server_full }}/check_mk/api/1.0/domain-types/downtime/collections/host"
    method: POST
    validate_certs: no
    headers:
      Authorization: "Bearer {{ cmk_user }} {{ cmk_secret }}"
      Accept: "application/json"
      Content-Type: "application/json"
    body_format: json
    body:
      start_time: "{{ checkmk_downtime_start.stdout }}"
      end_time: "{{ checkmk_downtime_end.stdout }}"
      comment: "Site update in progress"
      downtime_type: "host"
      host_name: "{{ inventory_hostname }}"

  when: server_site_version.stdout != cmk_version+"."+cmk_edition and not site_just_installed.changed and (cmk_user | default('') | trim) != '' and (cmk_secret | default('') | trim) != ''
  ignore_errors: yes
  delegate_to: localhost
  register: downtime_result

- name: "Update Sites to {{ cmk_version }}.{{ cmk_edition }}"
  become: True
  ansible.builtin.shell: |
    omd stop {{ cmk_site }}
    omd -f -V {{ cmk_version }}.{{ cmk_edition }} update --conflict=install {{ cmk_site }}
    omd start {{ cmk_site }}
  args:
    executable: /bin/bash
  when: server_site_version.stdout != cmk_version+"."+cmk_edition and not site_just_installed.changed
